<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo negro app-icon. -->
  <rect width="32" height="32" rx="5" fill="#000"/>

  <!-- Luna creciente grande y gorda para que se lea claro a 16x16.
       Dos círculos del mismo radio, el segundo enmascara la zona
       arriba-derecha del primero para dejar la silueta crema. -->
  <defs>
    <mask id="moon">
      <rect width="32" height="32" fill="white"/>
      <circle cx="22" cy="11" r="11" fill="black"/>
    </mask>
  </defs>
  <circle cx="14" cy="17" r="11" fill="#f0eee6" mask="url(#moon)"/>
</svg>
