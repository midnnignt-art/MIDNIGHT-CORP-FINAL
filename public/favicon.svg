<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo: cuadrado negro con esquinas suaves estilo app icon. -->
  <rect width="32" height="32" rx="6" fill="#000"/>

  <!-- Luna creciente: círculo crema enmascarado por otro círculo negro desplazado
       arriba-derecha para "comerse" esa porción y dejar la silueta de media luna
       con la parte iluminada hacia abajo-izquierda. -->
  <defs>
    <mask id="m">
      <rect width="32" height="32" fill="white"/>
      <circle cx="19.5" cy="13.5" r="10" fill="black"/>
    </mask>
  </defs>
  <circle cx="14.5" cy="16.5" r="10" fill="#f0eee6" mask="url(#m)"/>

  <!-- Punto rojo MIDNIGHT (estrella/destello) arriba-derecha. -->
  <circle cx="24" cy="9" r="1.3" fill="#E6392F"/>
</svg>
